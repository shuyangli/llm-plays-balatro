[models.gpt_5_4_mini]
routing = ["openai"]

[models.gpt_5_4_mini.providers.openai]
type = "openai"
model_name = "gpt-5.4-mini-2026-03-17"
api_type = "responses"
include_encrypted_reasoning = true

[models.gpt_5_4_nano]
routing = ["openai"]

[models.gpt_5_4_nano.providers.openai]
type = "openai"
model_name = "gpt-5.4-nano-2026-03-17"
api_type = "responses"
include_encrypted_reasoning = true

[functions.balatro_next_command]
type = "chat"
schemas.turn_context.path = "functions/balatro_next_command/turn_context_schema.json"

[functions.balatro_next_command.variants.default]
type = "chat_completion"
model = "gpt_5_4_mini"
reasoning_effort = "high"
templates.turn_context.path = "functions/balatro_next_command/default/turn_context.minijinja"

[functions.balatro_next_command.variants.strategy_v1]
type = "chat_completion"
model = "gpt_5_4_mini"
reasoning_effort = "high"
templates = { turn_context = { path = "functions/balatro_next_command/variants/strategy_v1/templates/turn_context.minijinja" }, system = { path = "functions/balatro_next_command/variants/strategy_v1/templates/system.minijinja" } }

[functions.balatro_next_command.experimentation]
type = "uniform"
candidate_variants = ["default", "strategy_v1"]

[evaluations]

[evaluations.balatro_action_quality]
type = "inference"
function_name = "balatro_next_command"
description = "Evaluates the quality of Balatro bot actions"

[evaluations.balatro_action_quality.evaluators]

[evaluations.balatro_action_quality.evaluators.action_quality]
type = "llm_judge"
input_format = "serialized"
output_type = "float"
optimize = "max"
variants = { judge_v1 = { type = "chat_completion", active = true, model = "openai::gpt-4o", json_mode = "on", system_instructions = "evaluations/balatro_action_quality/evaluators/action_quality/variants/judge_v1/system_instructions.txt", retries = { num_retries = 0, max_delay_s = 10.0} } }
include = { reference_output = false}
